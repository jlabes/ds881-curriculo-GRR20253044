name: CI/CD - Currículo Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  ci:
    name: Build e Compilação
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Organizar Arquivos Estáticos (Build)
        run: |
          mkdir -p dist/css dist/js dist/data

          cp src/index.html dist/

          [ -d "src/css" ] && cp -r src/css/* dist/css/ || true

          [ -d "src/js" ] && cp -r src/js/* dist/js/ || true
          [ -f "src/curriculo.js" ] && cp src/curriculo.js dist/js/ || true

          [ -d "src/resources/data" ] && cp -r src/resources/data/* dist/data/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist

  cd:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist

      - name: Deploy no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist